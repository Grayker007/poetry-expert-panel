<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭AI分享计划</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f0ebe3;
    font-family: 'Noto Sans SC', sans-serif;
  }

  .card {
    width: 420px;
    background: #fffdf9;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 36px 32px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -30px; left: -20px;
    width: 80px; height: 80px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  .header h1 {
    color: #fff;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 2px;
    margin-bottom: 8px;
    position: relative;
  }
  .header p {
    color: rgba(255,255,255,0.85);
    font-size: 14px;
    font-weight: 300;
    position: relative;
  }

  /* Body */
  .body { padding: 28px 28px 8px; }

  /* Idea */
  .idea {
    background: #f8f6f1;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    border-left: 4px solid #667eea;
  }
  .idea p {
    font-size: 15px;
    color: #3a3a3a;
    line-height: 1.7;
  }
  .idea strong { color: #5a4fb5; }

  /* Rotation */
  .rotation {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }
  .person {
    flex: 1;
    text-align: center;
    background: #fff;
    border-radius: 16px;
    padding: 18px 8px 14px;
    border: 1px solid #eee;
    transition: transform 0.2s;
  }
  .person:hover { transform: translateY(-2px); }
  .avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    margin: 0 auto 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }
  .person:nth-child(1) .avatar { background: linear-gradient(135deg, #667eea, #764ba2); }
  .person:nth-child(2) .avatar { background: linear-gradient(135deg, #f093fb, #f5576c); }
  .person:nth-child(3) .avatar { background: linear-gradient(135deg, #4facfe, #00f2fe); }
  .person .name {
    font-size: 16px;
    font-weight: 700;
    color: #333;
    margin-bottom: 4px;
  }
  .person .role {
    font-size: 11px;
    color: #999;
    line-height: 1.4;
  }
  .person .week {
    font-size: 11px;
    color: #fff;
    background: #667eea;
    border-radius: 20px;
    padding: 2px 10px;
    display: inline-block;
    margin-top: 8px;
  }
  .person:nth-child(2) .week { background: #f5576c; }
  .person:nth-child(3) .week { background: #00b4d8; }

  /* Rules */
  .rules {
    margin-bottom: 20px;
  }
  .rule {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
  }
  .rule:not(:last-child) {
    border-bottom: 1px solid #f0ede8;
  }
  .rule-icon {
    width: 32px; height: 32px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    background: #f3f0ff;
  }
  .rule-text {
    font-size: 14px;
    color: #555;
    line-height: 1.5;
  }
  .rule-text strong {
    color: #333;
    font-weight: 600;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 16px 28px 28px;
  }
  .footer .cta {
    font-size: 15px;
    color: #667eea;
    font-weight: 700;
  }
  .footer .sub {
    font-size: 12px;
    color: #bbb;
    margin-top: 6px;
  }

  /* Week 4 */
  .week4 {
    text-align: center;
    padding: 10px;
    margin-bottom: 16px;
    background: #fef9ef;
    border-radius: 12px;
    font-size: 13px;
    color: #c9a84c;
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>家庭 AI 分享</h1>
    <p>每月三次 · 三人轮值 · 一起探索未来</p>
  </div>

  <div class="body">
    <div class="idea">
      <p>每个月，我们<strong>每人讲一次</strong>自己用 AI 做的有意思的事。<br>不用准备 PPT，十几分钟，<strong>随便聊聊就好</strong>。</p>
    </div>

    <div class="rotation">
      <div class="person">
        <div class="avatar">👨</div>
        <div class="name">爸爸</div>
        <div class="role">未来引路人</div>
        <div class="week">第1周</div>
      </div>
      <div class="person">
        <div class="avatar">👩</div>
        <div class="name">妈妈</div>
        <div class="role">生活实践者</div>
        <div class="week">第2周</div>
      </div>
      <div class="person">
        <div class="avatar">👧</div>
        <div class="name">可心</div>
        <div class="role">小小探索者</div>
        <div class="week">第3周</div>
      </div>
    </div>

    <div class="week4">
      🌿 第4个周末自由安排，不强制
    </div>

    <div class="rules">
      <div class="rule">
        <div class="rule-icon">💬</div>
        <div class="rule-text"><strong>妈妈可以讲</strong>：用 Gemini 帮可心查作业的真实感受</div>
      </div>
      <div class="rule">
        <div class="rule-icon">✨</div>
        <div class="rule-text"><strong>可心可以讲</strong>：跟 AI 的一次有趣对话，或用 AI 画的画</div>
      </div>
      <div class="rule">
        <div class="rule-icon">🔮</div>
        <div class="rule-text"><strong>爸爸可以讲</strong>：新工具体验和未来趋势</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="cta">不是我教你们，是我们一起学</div>
    <div class="sub">2026年6月启动 · 郭家AI实验室</div>
  </div>
</div>

</body>
</html>
