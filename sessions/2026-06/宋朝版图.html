<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北宋政和元年疆域图</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Noto Sans SC',sans-serif;
    background:#f7f3eb;
    display:flex;justify-content:center;align-items:center;
    min-height:100vh;padding:20px;
  }
  .map-card{
    width:720px;height:600px;
    background:linear-gradient(180deg,#fdf8ee 0%,#f5edd8 40%,#e8dcc8 100%);
    border-radius:20px;overflow:hidden;
    box-shadow:0 6px 32px rgba(0,0,0,0.12);
    position:relative;
  }
  .map-bg{
    position:absolute;inset:0;
    background:
      radial-gradient(ellipse at 55% 35%,rgba(201,169,110,0.12) 0%,transparent 60%),
      radial-gradient(ellipse at 30% 60%,rgba(139,107,20,0.06) 0%,transparent 50%),
      radial-gradient(ellipse at 65% 55%,rgba(139,107,20,0.04) 0%,transparent 40%);
  }

  /* Title */
  .map-title{position:absolute;top:24px;left:0;right:0;text-align:center;z-index:10}
  .map-title h2{font-family:'Noto Serif SC',serif;font-size:20px;font-weight:900;color:#4a3728;letter-spacing:2px}
  .map-title p{font-size:11px;color:#a08560;margin-top:2px}

  /* Territory shape (Song proper) */
  .song-territory{
    position:absolute;
    top:68px;left:60px;right:80px;bottom:120px;
    background:linear-gradient(135deg,rgba(232,220,200,0.5),rgba(245,237,216,0.7),rgba(232,220,200,0.4));
    border-radius:40% 45% 35% 50% / 45% 40% 50% 38%;
    transform:rotate(-2deg);
    box-shadow:inset 0 2px 40px rgba(201,169,110,0.15),0 0 0 3px rgba(201,169,110,0.3);
  }

  /* Northern hostile territory */
  .north-territory{
    position:absolute;
    top:40px;left:40px;right:60px;
    height:80px;
    background:repeating-linear-gradient(90deg,rgba(180,180,180,0.15) 0px,rgba(180,180,180,0.15) 4px,transparent 4px,transparent 8px);
    border-radius:30px 40px 0 0;
    border:1px dashed rgba(180,180,180,0.4);
    border-bottom:none;
  }
  .north-label{position:absolute;top:52px;left:0;right:0;text-align:center;font-size:11px;color:#999;letter-spacing:3px}

  /* Rivers */
  .river-yellow{
    position:absolute;top:230px;left:80px;right:120px;
    height:4px;background:linear-gradient(90deg,rgba(120,170,200,0.4),rgba(120,170,200,0.6),rgba(120,170,200,0.3));
    border-radius:2px;transform:rotate(-3deg);
  }
  .river-yellow::after{content:'黄 河';position:absolute;right:-60px;top:-14px;font-size:10px;color:#7fa8c9;letter-spacing:2px}

  .river-yangtze{
    position:absolute;top:340px;left:60px;right:40px;
    height:5px;background:linear-gradient(90deg,rgba(120,170,200,0.5),rgba(120,170,200,0.7),rgba(120,170,200,0.4));
    border-radius:2px;transform:rotate(-1deg);
  }
  .river-yangtze::after{content:'长 江';position:absolute;right:-50px;top:-14px;font-size:10px;color:#7fa8c9;letter-spacing:2px}

  /* Sea */
  .sea{
    position:absolute;top:140px;right:22px;width:80px;bottom:130px;
    background:linear-gradient(180deg,rgba(180,210,235,0.4),rgba(180,210,235,0.2));
    border-radius:0 16px 16px 20px;border:1px solid rgba(160,190,215,0.3);
  }
  .sea-label{position:absolute;right:30px;top:50%;transform:translateY(-50%);writing-mode:vertical-rl;font-size:11px;color:#90b8d0;letter-spacing:3px}

  /* Cities and markers */
  .city{position:absolute;font-family:'Noto Serif SC',serif}
  .city-dot{display:block;width:6px;height:6px;background:#999;border-radius:50%;margin:0 auto 2px}
  .city-name{font-size:9px;color:#888;text-align:center;white-space:nowrap}

  /* Kaifeng - Capital */
  .kaifeng{
    position:absolute;top:195px;left:52%;
    transform:translateX(-50%);
  }
  .kaifeng-inner{
    position:relative;width:60px;height:60px;
  }
  .kaifeng-ripple1{
    position:absolute;inset:-12px;border-radius:50%;
    border:1.5px solid rgba(192,57,43,0.12);animation:ripple 3s infinite;
  }
  .kaifeng-ripple2{
    position:absolute;inset:-24px;border-radius:50%;
    border:1.5px solid rgba(192,57,43,0.08);animation:ripple 3s infinite 0.5s;
  }
  .kaifeng-dot{
    position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(circle,rgba(231,76,60,0.9),rgba(192,57,43,0.6));
    box-shadow:0 0 16px rgba(192,57,43,0.3);
    display:flex;align-items:center;justify-content:center;
  }
  @keyframes ripple{0%{transform:scale(0.8);opacity:1}100%{transform:scale(1.4);opacity:0}}
  .kaifeng-label{
    position:absolute;top:-58px;left:50%;transform:translateX(-50%);text-align:center;
  }
  .kaifeng-name{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:900;color:#c0392b;letter-spacing:1px}
  .kaifeng-sub{font-size:10px;color:#c0392b80}

  /* Poem marker - 如梦令 */
  .poem-marker{
    position:absolute;top:186px;left:54%;transform:translateX(-50%);
  }
  .poem-dot{width:18px;height:18px;border-radius:50%;background:#c9a96e;border:3px solid #fff;box-shadow:0 0 0 6px rgba(201,169,110,0.25),0 2px 8px rgba(0,0,0,0.15);margin:0 auto}
  .poem-label{position:absolute;top:-44px;left:160px;white-space:nowrap}
  .poem-label .star{color:#c9a96e;font-size:14px;font-weight:700}
  .poem-label .title{font-size:11px;color:#8b6914;font-weight:600}
  .poem-label .detail{font-size:9px;color:#999;margin-top:1px}

  /* Future poem marker */
  .future-marker{position:absolute;top:370px;left:48%;}
  .future-dot{width:10px;height:10px;border-radius:50%;border:1.5px dashed #bbb;background:rgba(255,255,255,0.5);margin:0 auto}
  .future-label{text-align:center;white-space:nowrap;font-size:9px;color:#bbb;margin-top:3px}

  /* Migration arrow */
  .migration-line{position:absolute;top:200px;left:53%;width:80px;height:185px;border-right:1.5px dashed rgba(180,180,180,0.6);border-radius:0 50% 30px 0;transform:rotate(8deg)}
  .migration-arrow{position:absolute;top:370px;left:50%;font-size:18px;color:#bbb;transform:rotate(12deg)}

  /* Jin invasion */
  .invasion{position:absolute;top:100px;right:120px}
  .invasion-arrow{font-size:20px;color:#e74c3c;opacity:0.6;transform:rotate(-25deg) scaleX(1.5)}
  .invasion-text{font-size:9px;color:#e74c3c;position:absolute;top:-18px;left:30px;white-space:nowrap}

  /* Other cities */
  /* Legend */
  .legend{position:absolute;bottom:40px;left:0;right:0;display:flex;justify-content:center;gap:24px;flex-wrap:wrap;padding:10px 20px}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:10px;color:#888}
  .legend-dot{width:8px;height:8px;border-radius:50%}
  .legend-dot.today{background:#c9a96e;box-shadow:0 0 6px rgba(201,169,110,0.4)}
  .legend-dot.future{border:1.5px dashed #bbb;background:transparent}
  .legend-dot.capital{background:#c0392b;box-shadow:0 0 4px rgba(192,57,43,0.3)}

  /* Background mountains texture */
  .mountains{
    position:absolute;bottom:80px;left:40px;right:40px;height:40px;
    opacity:0.08;
    background:repeating-conic-gradient(#4a3728 0% 25%,transparent 0% 50%) 50%/20px 20px;
  }
</style>
</head>
<body>
<div class="map-card">
  <div class="map-bg"></div>

  <div class="map-title">
    <h2>北宋政和元年 · 疆域图</h2>
    <p>西元1111年 · 宋徽宗在位 · 李清照约27岁</p>
  </div>

  <!-- Song territory -->
  <div class="song-territory"></div>

  <!-- Northern rivals -->
  <div class="north-territory"></div>
  <div class="north-label">辽（西辽）· 金 · 西夏</div>

  <!-- Rivers -->
  <div class="river-yellow"></div>
  <div class="river-yangtze"></div>

  <!-- Sea -->
  <div class="sea"></div>
  <div class="sea-label">东 海</div>

  <!-- Kaifeng -->
  <div class="kaifeng">
    <div class="kaifeng-inner">
      <div class="kaifeng-ripple1"></div>
      <div class="kaifeng-ripple2"></div>
      <div class="kaifeng-dot"></div>
    </div>
  </div>
  <div class="kaifeng-label">
    <div class="kaifeng-name">汴 京</div>
    <div class="kaifeng-sub">东京开封府 · 今河南开封</div>
  </div>

  <!-- Poem marker -->
  <div class="poem-marker">
    <div class="poem-dot"></div>
  </div>
  <div class="poem-label">
    <span class="star">⭐ 写《如梦令》(1099)</span>
    <span class="detail" style="display:block">16岁 · 汴京 · 少女划船</span>
  </div>

  <!-- Other cities -->
  <div class="city" style="top:170px;left:44%"><span class="city-dot"></span><span class="city-name">洛阳</span></div>
  <div class="city" style="top:250px;left:34%"><span class="city-dot"></span><span class="city-name">长安</span></div>
  <div class="city" style="top:290px;left:50%"><span class="city-dot"></span><span class="city-name">襄阳</span></div>
  <div class="city" style="top:220px;left:62%"><span class="city-dot" style="background:#27ae60"></span><span class="city-name">青州</span></div>
  <div class="city" style="top:380px;left:58%"><span class="city-dot"></span><span class="city-name">临安</span></div>
  <div class="city" style="top:360px;left:50%"><span class="city-dot"></span><span class="city-name">建康</span></div>

  <!-- Future marker -->
  <div class="future-marker">
    <div class="future-dot"></div>
    <div class="future-label">◯ 写《渔家傲》(1130) · 47岁 · 南渡后</div>
  </div>

  <!-- Migration -->
  <div class="migration-line"></div>
  <div class="migration-arrow">↘</div>

  <!-- Invasion -->
  <div class="invasion">
    <div class="invasion-arrow">⇩</div>
    <div class="invasion-text">⚔️ 1127年金兵南下 · 靖康之变</div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot capital"></div> 首都（汴京）</div>
    <div class="legend-item"><div class="legend-dot today"></div> 今天的诗（16岁·汴京）</div>
    <div class="legend-item"><div class="legend-dot future"></div> 下次相遇（47岁·建康）</div>
    <div class="legend-item"><span style="color:#e74c3c;font-weight:600">⚔️</span> 靖康之变（1127）</div>
    <div class="legend-item"><span style="color:#bbb">↘</span> 南渡路线</div>
  </div>

  <!-- Mountains -->
  <div class="mountains"></div>
</div>
</body>
</html>
